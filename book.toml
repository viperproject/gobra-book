[book]
authors = ["Ali Gottschall", "João Pereira"]
language = "en"
src = "src"
title = "Practical Program Verification in Go with Gobra (alpha)"

[output.html]
theme = "theme"
additional-css = [
  "gobra.css"
]
additional-js = [
              "gobra-book.js",
              "mode-golang.js",
              "mode-gobra.js",
              ]
mathjax-support = true

[output.html.playground]
editable = true
copy-js = true

[preprocessor.quiz]

[output.linkcheck]
warning-policy = "ignore"
